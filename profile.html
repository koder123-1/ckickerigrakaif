<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👤 Профиль - КЛИКЕР ЭПОХИ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="galaxy-bg">
        <div class="nebula"></div>
        <div class="stars-layer"></div>
    </div>

    <nav class="main-nav glass-effect">
        <div class="nav-container">
            <div class="nav-logo">
                <span class="logo-glow">✨КЛИКЕР✨</span>
            </div>
            <div class="nav-links">
                <a href="game.html" class="nav-link">💎 Игра</a>
                <a href="shop.html" class="nav-link">🏪 Магазин</a>
                <a href="stats.html" class="nav-link">📊 Статистика</a>
                <a href="profile.html" class="nav-link active">👤 Профиль</a>
            </div>
        </div>
    </nav>

    <main class="game-main">
        <div class="game-container profile-container">
            <div class="profile-header">
                <div class="profile-avatar-large" id="profileAvatar">👤</div>
                <h2 class="profile-name" id="profileName">Загрузка...</h2>
                <div class="profile-email" id="profileEmail">загрузка...</div>
            </div>

            <div class="profile-stats">
                <div class="profile-stat-item">
                    <div class="profile-stat-value" id="profileCrystals">0</div>
                    <div class="profile-stat-label">Кристаллов</div>
                </div>
                <div class="profile-stat-item">
                    <div class="profile-stat-value" id="profileClicks">0</div>
                    <div class="profile-stat-label">Всего кликов</div>
                </div>
                <div class="profile-stat-item">
                    <div class="profile-stat-value" id="profilePower">1</div>
                    <div class="profile-stat-label">Сила клика</div>
                </div>
                <div class="profile-stat-item">
                    <div class="profile-stat-value" id="profileLevel">1</div>
                    <div class="profile-stat-label">Уровень</div>
                </div>
            </div>

            <div class="profile-settings">
                <h3 class="settings-title">⚙️ Настройки</h3>
                <div class="setting-item">
                    <span class="setting-label">🔔 Звуки</span>
                    <div class="setting-toggle" id="soundToggle"></div>
                </div>
                <div class="setting-item">
                    <span class="setting-label">🎨 Эффекты</span>
                    <div class="setting-toggle active" id="effectsToggle"></div>
                </div>
                <div class="setting-item">
                    <span class="setting-label">💾 Автосохранение</span>
                    <div class="setting-toggle active" id="autoSaveToggle"></div>
                </div>
            </div>

            <button class="logout-btn" id="logoutBtn">
                <span>👋</span> Выйти из аккаунта
            </button>

            <a href="game.html" class="back-btn">← Вернуться в игру</a>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
