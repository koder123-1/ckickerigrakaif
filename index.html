<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ КЛИКЕР ЭПОХИ ✨</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
    <!-- Анимированный фон с частицами -->
    <div class="cosmic-bg">
        <div class="stars"></div>
        <div class="twinkling"></div>
        <div class="clouds"></div>
    </div>

    <!-- Плавающие кристаллы -->
    <div class="floating-crystals">
        <div class="crystal crystal1">💎</div>
        <div class="crystal crystal2">✨</div>
        <div class="crystal crystal3">💫</div>
        <div class="crystal crystal4">⚡</div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon">💎</div>
                <h1>КЛИКЕР ЭПОХИ</h1>
                <div class="logo-shine"></div>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab">Вход</button>
                <button class="auth-tab" id="registerTab">Регистрация</button>
            </div>

            <!-- Форма входа -->
            <form class="auth-form active" id="loginForm">
                <div class="input-group">
                    <div class="input-icon">📧</div>
                    <input type="email" placeholder="Электронная почта" required id="loginEmail">
                </div>
                <div class="input-group">
                    <div class="input-icon">🔒</div>
                    <input type="password" placeholder="Пароль" required id="loginPassword">
                </div>
                <button type="submit" class="auth-submit">
                    <span>🚀 Войти</span>
                    <div class="submit-shine"></div>
                </button>
            </form>

            <!-- Форма регистрации -->
            <form class="auth-form" id="registerForm">
                <div class="input-group">
                    <div class="input-icon">👤</div>
                    <input type="text" placeholder="Имя пользователя" required id="registerName">
                </div>
                <div class="input-group">
                    <div class="input-icon">📧</div>
                    <input type="email" placeholder="Электронная почта" required id="registerEmail">
                </div>
                <div class="input-group">
                    <div class="input-icon">🔒</div>
                    <input type="password" placeholder="Пароль" required id="registerPassword">
                </div>
                <div class="input-group">
                    <div class="input-icon">🔒</div>
                    <input type="password" placeholder="Подтвердите пароль" required id="registerConfirm">
                </div>
                <button type="submit" class="auth-submit">
                    <span>✨ Создать аккаунт</span>
                    <div class="submit-shine"></div>
                </button>
            </form>

            <div class="auth-divider">
                <span>или войдите через</span>
            </div>

            <div class="social-auth">
                <button class="social-btn google">
                    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cpath fill='%23FFC107' d='M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z'/%3E%3Cpath fill='%23FF3D00' d='M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z'/%3E%3Cpath fill='%234CAF50' d='M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z'/%3E%3Cpath fill='%231976D2' d='M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z'/%3E%3C/svg%3E" alt="Google">
                    Google
                </button>
                <button class="social-btn github">
                    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.108-.775.418-1.305.762-1.604-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z'/%3E%3C/svg%3E" alt="GitHub">
                    GitHub
                </button>
            </div>

            <div class="auth-footer">
                <p>Нажимая "Войти", вы соглашаетесь с <a href="#">условиями использования</a></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
